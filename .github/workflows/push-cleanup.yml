name: Push Cleanup

# Corre cada hora a los :15 (15 minutos pasada la hora). Stagger con
# Reminders Cron (:05) para evitar pico simultáneo de invocaciones.
#
# Llama el endpoint /api/push/cleanup que:
#   - Reprocesa items pending stuck (>30 min)
#   - Dead-letter items pending >24h
#   - Borra rows sent/failed/invalid >7 días
#   - Borra subscriptions con expired_at >30 días
on:
  schedule:
    - cron: "15 * * * *"
  # workflow_dispatch para ejecución manual desde la UI (útil para testing).
  workflow_dispatch:

jobs:
  trigger-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/push/cleanup
        run: |
          # -L: sigue redirects (308 → URL final) reenviando los headers.
          response=$(curl -s -L --post301 --post302 --post303 \
            -o /tmp/push-cleanup-body -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CRON_BASE_URL }}/api/push/cleanup")
          echo "HTTP $response"
          cat /tmp/push-cleanup-body
          if [ "$response" -ne 200 ]; then
            echo "Push cleanup failed with status $response"
            exit 1
          fi
