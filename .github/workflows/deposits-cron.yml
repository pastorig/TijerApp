name: Deposits Cron

# Auto-cancela las señas de MercadoPago impagas y vencidas (libera el horario).
# Corre cada hora a los :10 (offset de reminders :05 y push-cleanup :15).
on:
  schedule:
    - cron: "10 * * * *"
  # Ejecución manual desde la UI de GitHub Actions (útil para testing).
  workflow_dispatch:
    inputs:
      force:
        description: "Force mode (no aplica acá, pero se acepta por consistencia)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  trigger-deposits:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/cron/deposits
        run: |
          # -L: sigue redirects (308 → URL final) reenviando los headers.
          QUERY=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            QUERY="?force=true"
          fi
          echo "Calling with query: ${QUERY:-<none>}"
          response=$(curl -s -L --post301 --post302 --post303 \
            -o /tmp/cron-body -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CRON_BASE_URL }}/api/cron/deposits${QUERY}")
          echo "HTTP $response"
          cat /tmp/cron-body
          if [ "$response" -ne 200 ]; then
            echo "Cron failed with status $response"
            exit 1
          fi
