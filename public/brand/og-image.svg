<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Isotipo TijerApp — posición (96, 215), escala 2x → 200×200 (viewBox base 100×100) -->
  <g transform="translate(96 215) scale(2)" stroke-linejoin="round" stroke-linecap="round">
    <!-- Ala izquierda -->
    <path d="M 22 28 L 48 28 L 48 38 L 28 38 Z"
          fill="#c9a23e" stroke="#c9a23e" stroke-width="0.8"/>
    <!-- Ala derecha -->
    <path d="M 52 28 L 78 28 L 72 38 L 52 38 Z"
          fill="#c9a23e" stroke="#c9a23e" stroke-width="0.8"/>
    <!-- Stem -->
    <path d="M 44 41 L 56 41 L 54 82 L 46 82 Z"
          fill="#c9a23e" stroke="#c9a23e" stroke-width="0.8"/>
  </g>

  <!-- Wordmark -->
  <text x="380" y="332" font-family="Geist, system-ui, sans-serif" font-weight="900" font-size="92" letter-spacing="6">
    <tspan fill="#c9a23e">TIJER</tspan><tspan fill="#d8d8d8">APP</tspan>
  </text>

  <!-- Tagline -->
  <text x="380" y="392" font-family="Geist, system-ui, sans-serif" font-weight="400" font-size="22" fill="#8a8a8a" letter-spacing="2">
    SISTEMA DE TURNOS PARA BARBERÍAS MODERNAS
  </text>

  <!-- Hairline divider -->
  <line x1="96" y1="500" x2="1104" y2="500" stroke="#c9a23e" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Footer -->
  <text x="96" y="555" font-family="Geist Mono, ui-monospace, monospace" font-weight="500" font-size="16" fill="#5a5a5a" letter-spacing="3">
    TIJERAPP.COM
  </text>
</svg>
