    <rect x="156" y="104" width="44" height="44" fill="none" stroke="#c9a23e" stroke-width="2" stroke-opacity="0.35"/>
    <rect x="0"   y="156" width="44" height="44" fill="#c9a23e"/>
    <rect x="52"  y="156" width="44" height="44" fill="none" stroke="#c9a23e" stroke-width="2" stroke-opacity="0.35"/>
    <rect x="104" y="156" width="44" height="44" fill="none" stroke="#c9a23e" stroke-width="2" stroke-opacity="0.35"/>
